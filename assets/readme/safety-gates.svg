  <text x="56" y="62" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Safety Gates</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="750">
    <rect x="58" y="116" width="150" height="80" rx="14" fill="#1e293b" stroke="#5eead4"/><text x="82" y="150" fill="#e0f2fe">Spec</text><text x="82" y="176" fill="#e0f2fe">Approved</text>
    <rect x="232" y="116" width="150" height="80" rx="14" fill="#1e293b" stroke="#93c5fd"/><text x="263" y="150" fill="#e0f2fe">Tests</text><text x="263" y="176" fill="#e0f2fe">First</text>
