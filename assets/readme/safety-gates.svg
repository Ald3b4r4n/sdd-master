  </g>
  <path d="M132 238 H1000" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
  <g fill="#5eead4">
    <circle cx="132" cy="238" r="8"/><circle cx="306" cy="238" r="8"/><circle cx="480" cy="238" r="8"/><circle cx="654" cy="238" r="8"/><circle cx="828" cy="238" r="8"/><circle cx="1002" cy="238" r="8"/>
