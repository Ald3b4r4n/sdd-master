<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="340" viewBox="0 0 1100 340" role="img" aria-labelledby="title desc">
  <title id="title">SDD Master safety gates</title>
  <desc id="desc">Safety gates for specification, tests, docs, security, audit and human approval.</desc>
